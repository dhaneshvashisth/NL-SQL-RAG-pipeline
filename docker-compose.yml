version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: nl_sql_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nl_sql_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nl_sql_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   
      - "6334:6334"  
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - nl_sql_network

  redis:
    image: redis:7-alpine
    container_name: nl_sql_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - nl_sql_network

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

networks:
  nl_sql_network:
    driver: bridge